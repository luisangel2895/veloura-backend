# ── Veloura Postgres host-based auth ──────────────────────────────
# Replaces the default trust-auth-on-localhost that the postgres image
# ships with. All client connections (even from inside the container)
# now require a SCRAM-SHA-256 password.
#
# Network entries are limited to the docker bridge subnet so postgres
# never accepts off-host connections even if the port were exposed by
# accident.
#
# Format: TYPE DATABASE USER ADDRESS METHOD

# Local socket — runtime user only
local   all             all                                     scram-sha-256

# Loopback inside the container (e.g. healthchecks via psql)
host    all             all             127.0.0.1/32            scram-sha-256
host    all             all             ::1/128                 scram-sha-256

# Docker bridge (compose default network — covers veloura medusa/worker)
host    all             all             172.16.0.0/12           scram-sha-256
host    all             all             10.0.0.0/8              scram-sha-256

# Replication is intentionally not configured.

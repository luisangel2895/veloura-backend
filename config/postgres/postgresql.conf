# ── Veloura Postgres tuning ───────────────────────────────────────
# Tuned for the Elastika VPS: 16 GB RAM, 6 vCPU, NVMe-backed disk
# (~300 MB/s sustained), Postgres in a Docker container with a 2 GB
# memory limit. Values are conservative to leave headroom for the
# medusa, redis, minio and caddy containers running on the same host.
#
# These values OVERRIDE the postgres image defaults via the
# `command: ["postgres", "-c", "config_file=..."]` directive in
# docker-compose.prod.yml. They are loaded on container start.
#
# References: https://pgtune.leopard.in.ua/ (settings: oltp, 2GB RAM,
# 50 connections, ssd, 6 cpus)

# ── Connections ───────────────────────────────────────────────────
listen_addresses = '*'
max_connections = 100

# ── Memory ────────────────────────────────────────────────────────
shared_buffers = 512MB              # 25% of container memory
effective_cache_size = 1500MB       # ~75% of container memory
work_mem = 8MB                      # per-operation, conservative
maintenance_work_mem = 128MB
huge_pages = off

# ── Write-ahead log ───────────────────────────────────────────────
wal_buffers = 16MB
wal_level = replica
synchronous_commit = on             # never lose committed orders
checkpoint_completion_target = 0.9
checkpoint_timeout = 15min
max_wal_size = 2GB
min_wal_size = 512MB

# ── Background writer / autovacuum ────────────────────────────────
random_page_cost = 1.1              # SSD
effective_io_concurrency = 200      # SSD
autovacuum = on
autovacuum_max_workers = 3
autovacuum_naptime = 30s

# ── Parallel query ────────────────────────────────────────────────
max_worker_processes = 6
max_parallel_workers_per_gather = 2
max_parallel_workers = 4
max_parallel_maintenance_workers = 2

# ── Logging ───────────────────────────────────────────────────────
log_destination = 'stderr'
logging_collector = off
log_min_duration_statement = 1000   # log queries > 1s
log_line_prefix = '%t [%p]: db=%d,user=%u,app=%a '
log_checkpoints = on
log_connections = off
log_disconnections = off
log_lock_waits = on
log_temp_files = 0
log_autovacuum_min_duration = 0
log_error_verbosity = default
log_timezone = 'UTC'
datestyle = 'iso, mdy'
timezone = 'UTC'

# ── Statistics ────────────────────────────────────────────────────
track_io_timing = on
track_functions = pl

# ── Locale ────────────────────────────────────────────────────────
lc_messages = 'C.UTF-8'
lc_monetary = 'C.UTF-8'
lc_numeric = 'C.UTF-8'
lc_time = 'C.UTF-8'
default_text_search_config = 'pg_catalog.english'

# ── Auth ──────────────────────────────────────────────────────────
# Force scram-sha-256 for all client connections (no md5, no trust).
password_encryption = scram-sha-256

version: 2
updates:
  # ── npm dependencies ──────────────────────────────────────────
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "America/Lima"
    open-pull-requests-limit: 5
    versioning-strategy: increase-if-necessary
    labels:
      - "dependencies"
      - "javascript"
    groups:
      medusa:
        patterns:
          - "@medusajs/*"
      typescript-tooling:
        patterns:
          - "typescript"
          - "typescript-eslint"
          - "@types/*"
          - "eslint*"
          - "@eslint/*"
          - "prettier"
      vitest:
        patterns:
          - "vitest"
          - "@vitest/*"
    ignore:
      # Major version bumps for medusa go through manual review.
      - dependency-name: "@medusajs/*"
        update-types: ["version-update:semver-major"]

  # ── GitHub Actions ────────────────────────────────────────────
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "ci"

  # ── Docker base images ────────────────────────────────────────
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "docker"

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # 20.20.0+ is required because vitest 4.x dynamically requires
  # std-env (an ESM-only package). Node < 20.20 throws ERR_REQUIRE_ESM
  # at vitest startup. Pinning to 20.20.2 (current LTS minor with
  # require(esm) supported by default) for reproducibility.
  NODE_VERSION: "20.20.2"
  # Bake a placeholder backend URL into the admin bundle for the CI
  # validation build. The CI artifact is never deployed; the real value
  # is set on the server by the deploy workflow.
  MEDUSA_BACKEND_URL: http://ci.placeholder.local

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci --no-audit --no-fund
      - name: ESLint
        run: npm run lint
      - name: Prettier
        run: npm run format:check

  typecheck:
    name: Type Check (src + tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci --no-audit --no-fund
      - name: TypeScript (src)
        run: npm run typecheck
      - name: TypeScript (tests)
        run: npm run typecheck:test

  test:
    name: Vitest
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci --no-audit --no-fund
      - name: Run tests with coverage
        run: npm run test:coverage
      - name: Upload coverage artifact
        # Only run when coverage/ exists. v4 of upload-artifact is
        # deprecated and was failing in our CI runner — bumped to v7
        # (current major). Dependabot opened the PR independently.
        if: success() && hashFiles('coverage/**') != ''
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage/
          retention-days: 7
          if-no-files-found: warn

  build:
    name: Medusa build
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci --no-audit --no-fund
      - name: Build Medusa (with placeholder backend URL)
        run: npm run build
      - name: Verify dist contains compiled medusa-config.js
        run: test -f dist/medusa-config.js

  docker:
    name: Docker build (validation only)
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - name: Pre-build host artifacts (mirror server prebuild flow)
        run: |
          npm ci --no-audit --no-fund
          npm run build
          rm -rf node_modules
          npm ci --omit=dev --no-audit --no-fund
      - uses: docker/setup-buildx-action@v3
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: veloura-medusa:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

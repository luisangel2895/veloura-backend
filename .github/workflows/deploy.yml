name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:  # allow manual trigger from GitHub UI

jobs:
  deploy:
    name: Deploy to server
    runs-on: ubuntu-latest
    steps:
      - name: SSH and deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          command_timeout: 15m
          script_stop: true
          script: |
            set -euo pipefail
            cd /home/deploy/apps/veloura

            echo ">>> Pulling latest from main"
            git fetch origin main
            git reset --hard origin/main

            echo ">>> Pre-deploy backup"
            mkdir -p logs
            ./scripts/backup-db.sh

            echo ">>> Pre-build node_modules + medusa build on host"
            # MEDUSA_BACKEND_URL must be set so the admin UI bundle bakes the
            # right backend URL (vite replaces __BACKEND_URL__ at build time).
            # If we change the public URL, this value must be updated.
            export MEDUSA_BACKEND_URL=http://161.132.40.176
            rm -rf node_modules
            npm ci --no-audit --no-fund
            npm run build
            rm -rf node_modules
            npm ci --omit=dev --no-audit --no-fund

            echo ">>> Docker rebuild & restart medusa stack"
            docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --build medusa medusa-worker

            echo ">>> Wait for medusa to be healthy"
            status="missing"
            for i in $(seq 1 40); do
              status=$(docker inspect veloura-medusa --format='{{.State.Health.Status}}' 2>/dev/null || echo "missing")
              if [ "$status" = "healthy" ]; then
                echo "  medusa is healthy"
                break
              fi
              echo "  attempt $i/40: $status"
              sleep 3
            done
            if [ "$status" != "healthy" ]; then
              echo "FAIL: medusa never became healthy"
              docker logs veloura-medusa --tail 50
              exit 1
            fi

            echo ">>> Smoke test: /health endpoint"
            curl -fsS http://127.0.0.1/health || (echo "Health endpoint failed"; exit 1)

            echo ">>> Cleanup old images"
            docker image prune -f

            echo ">>> Deploy complete"

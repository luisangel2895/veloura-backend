## Docker Compose for VPS production deployment
## All services run in Docker including Medusa
## Usage: docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --build

services:
  # ── Reverse Proxy (HTTP only — no domain yet) ───────────────────
  caddy:
    image: caddy:2-alpine
    container_name: veloura-caddy
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      medusa:
        condition: service_healthy
    networks:
      - veloura
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.25"
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # ── Medusa API + Admin ──────────────────────────────────────────
  medusa:
    build:
      context: .
      dockerfile: Dockerfile
    image: veloura-medusa:latest
    container_name: veloura-medusa
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgres://veloura:${POSTGRES_PASSWORD}@postgres:5432/veloura_medusa
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET}
      - COOKIE_SECRET=${COOKIE_SECRET}
      - STORE_CORS=${STORE_CORS}
      - ADMIN_CORS=${ADMIN_CORS}
      - AUTH_CORS=${AUTH_CORS}
      - STRIPE_API_KEY=${STRIPE_API_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - MEDUSA_BACKEND_URL=${MEDUSA_BACKEND_URL}
      - WORKER_MODE=server
      - S3_ENDPOINT=${S3_ENDPOINT}
      - S3_BUCKET=${S3_BUCKET}
      - S3_REGION=${S3_REGION}
      - S3_ACCESS_KEY_ID=${MINIO_ROOT_USER}
      - S3_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD}
      - S3_FILE_URL=${S3_FILE_URL}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - veloura
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G
        reservations:
          cpus: "1"
          memory: 1G
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # ── Medusa Worker ───────────────────────────────────────────────
  # Reuses the image built by the `medusa` service — no separate build,
  # avoids docker compose running two parallel `npm ci` (which deadlocks).
  medusa-worker:
    image: veloura-medusa:latest
    container_name: veloura-worker
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgres://veloura:${POSTGRES_PASSWORD}@postgres:5432/veloura_medusa
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET}
      - COOKIE_SECRET=${COOKIE_SECRET}
      - STRIPE_API_KEY=${STRIPE_API_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - WORKER_MODE=worker
      - S3_ENDPOINT=${S3_ENDPOINT}
      - S3_BUCKET=${S3_BUCKET}
      - S3_REGION=${S3_REGION}
      - S3_ACCESS_KEY_ID=${MINIO_ROOT_USER}
      - S3_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD}
      - S3_FILE_URL=${S3_FILE_URL}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'medusa start' > /dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - veloura
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # ── PostgreSQL ──────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: veloura-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: veloura
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: veloura_medusa
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U veloura -d veloura_medusa"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - veloura
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G
        reservations:
          cpus: "1"
          memory: 1G
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # ── Redis ───────────────────────────────────────────────────────
  # appendfsync everysec is REQUIRED on this VPS — the disk is slow and
  # default fsync (always) saturates IO and stalls Medusa requests.
  # maxmemory-policy=noeviction is required by Medusa (workflow engine
  # state must not be silently evicted under memory pressure).
  redis:
    image: redis:7-alpine
    container_name: veloura-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --appendfsync everysec --maxmemory 256mb --maxmemory-policy noeviction
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - veloura
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M
        reservations:
          cpus: "0.5"
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # ── MinIO (S3-compatible storage) ───────────────────────────────
  # Built from Dockerfile.minio (Alpine + statically-linked official MinIO
  # binary) because the official minio/minio image requires x86-64-v2 CPU
  # which this VPS QEMU vCPU does not expose. See Dockerfile.minio for
  # the full story.
  # No host port exposure — only reachable on the internal `veloura`
  # network. Public access goes through Caddy /media/*.
  minio:
    build:
      context: .
      dockerfile: Dockerfile.minio
    image: veloura-minio:latest
    container_name: veloura-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      # Auto-configure mc alias `local` for the healthcheck (mc reads MC_HOST_<alias>)
      MC_HOST_local: http://${MINIO_ROOT_USER}:${MINIO_ROOT_PASSWORD}@127.0.0.1:9000
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - veloura
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # ── MinIO bucket initialization (runs once, then exits) ─────────
  # Creates the medusa-media bucket and makes it public read-only.
  # Reuses the custom veloura-minio image (which bundles `mc`) instead of
  # minio/mc:latest, since that image has the same x86-64-v2 issue.
  minio-init:
    image: veloura-minio:latest
    container_name: veloura-minio-init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MC_HOST_local: http://${MINIO_ROOT_USER}:${MINIO_ROOT_PASSWORD}@minio:9000
    entrypoint: >
      /bin/sh -c "
      mc mb --ignore-existing local/medusa-media &&
      mc anonymous set download local/medusa-media &&
      echo 'Bucket medusa-media ready (public download)';
      "
    networks:
      - veloura
    restart: "no"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "2"

  # ── Watchtower (auto-update base images) ────────────────────────
  # Uses nickfedor/watchtower (maintained fork) — the original
  # containrrr/watchtower is archived and ships an old Docker API client
  # that this server's daemon refuses ("client version 1.25 is too old").
  watchtower:
    image: nickfedor/watchtower:latest
    container_name: veloura-watchtower
    restart: unless-stopped
    environment:
      WATCHTOWER_CLEANUP: "true"
      WATCHTOWER_SCHEDULE: "0 0 4 * * *"
      WATCHTOWER_MONITOR_ONLY: "false"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - veloura
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

volumes:
  postgres_data:
  redis_data:
  minio_data:
  caddy_data:
  caddy_config:

networks:
  veloura:
    driver: bridge

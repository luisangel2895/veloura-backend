## Docker Compose for VPS production deployment
## All services run in Docker including Medusa
## Usage: docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --build

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "50m"
    max-file: "5"

x-restart-policy: &default-restart
  restart: unless-stopped

services:
  # ── Reverse Proxy (HTTP only — no domain yet) ───────────────────
  caddy:
    <<: *default-restart
    image: caddy:2-alpine
    container_name: veloura-caddy
    init: true
    read_only: true
    tmpfs:
      - /tmp
    ports:
      - "80:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      medusa:
        condition: service_healthy
    networks:
      - veloura
    # Caddy healthcheck hits its own /caddyhealth endpoint (defined in
    # Caddyfile) which responds 200 directly WITHOUT proxying to medusa.
    # Using /health would cascade failures: caddy would report unhealthy
    # whenever medusa is unhealthy, which confuses monitoring.
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://127.0.0.1/caddyhealth"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    labels:
      com.centurylinklabs.watchtower.enable: "true"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.25"
          memory: 128M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
        window: 120s
    logging: *default-logging

  # ── Medusa API + Admin ──────────────────────────────────────────
  medusa:
    <<: *default-restart
    build:
      context: .
      dockerfile: Dockerfile
    image: veloura-medusa:latest
    container_name: veloura-medusa
    init: true
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://veloura:${POSTGRES_PASSWORD}@postgres:5432/veloura_medusa
      DATABASE_LOGGING: ${DATABASE_LOGGING:-false}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1h}
      COOKIE_SECRET: ${COOKIE_SECRET}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      STORE_CORS: ${STORE_CORS}
      ADMIN_CORS: ${ADMIN_CORS}
      AUTH_CORS: ${AUTH_CORS}
      STRIPE_API_KEY: ${STRIPE_API_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      MEDUSA_BACKEND_URL: ${MEDUSA_BACKEND_URL}
      WORKER_MODE: server
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_BUCKET: ${S3_BUCKET}
      S3_REGION: ${S3_REGION}
      # S3 credentials derived from MinIO root for now. Single-bucket
      # setup means a scoped service account would not meaningfully
      # reduce blast radius. TODO: switch to a least-privilege MinIO
      # service account when a second bucket is introduced.
      S3_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      S3_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      S3_FILE_URL: ${S3_FILE_URL}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://127.0.0.1:9000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - veloura
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G
        reservations:
          cpus: "1"
          memory: 1G
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
        window: 300s
    logging: *default-logging

  # ── Medusa Worker ───────────────────────────────────────────────
  # Reuses the image built by the `medusa` service — no separate build,
  # avoids docker compose running two parallel `npm ci` (which deadlocks).
  # Worker explicitly does NOT receive Stripe credentials (no payment
  # processing happens on the worker side, this is privilege reduction).
  medusa-worker:
    <<: *default-restart
    image: veloura-medusa:latest
    container_name: veloura-worker
    init: true
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://veloura:${POSTGRES_PASSWORD}@postgres:5432/veloura_medusa
      DATABASE_LOGGING: ${DATABASE_LOGGING:-false}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1h}
      COOKIE_SECRET: ${COOKIE_SECRET}
      MEDUSA_BACKEND_URL: ${MEDUSA_BACKEND_URL}
      WORKER_MODE: worker
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_BUCKET: ${S3_BUCKET}
      S3_REGION: ${S3_REGION}
      S3_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      S3_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      S3_FILE_URL: ${S3_FILE_URL}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'medusa start' > /dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - veloura
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 512M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
        window: 300s
    logging: *default-logging

  # ── PostgreSQL ──────────────────────────────────────────────────
  # Uses a custom postgresql.conf and pg_hba.conf mounted from
  # ./config/postgres. Both files are in git so the tuning is
  # reproducible across deploys.
  postgres:
    <<: *default-restart
    image: postgres:16-alpine
    container_name: veloura-postgres
    init: true
    command:
      - postgres
      - -c
      - config_file=/etc/postgresql/postgresql.conf
      - -c
      - hba_file=/etc/postgresql/pg_hba.conf
    environment:
      POSTGRES_USER: veloura
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: veloura_medusa
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256 --auth-local=scram-sha-256"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./config/postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
      - ./config/postgres/pg_hba.conf:/etc/postgresql/pg_hba.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U veloura -d veloura_medusa"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - veloura
    labels:
      com.centurylinklabs.watchtower.enable: "true"
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G
        reservations:
          cpus: "1"
          memory: 1G
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
        window: 300s
    logging: *default-logging

  # ── Redis ───────────────────────────────────────────────────────
  # appendfsync everysec is REQUIRED on this VPS — the disk is slow and
  # default fsync (always) saturates IO and stalls Medusa requests.
  # maxmemory-policy=noeviction is required by Medusa (workflow engine
  # state must not be silently evicted under memory pressure).
  redis:
    <<: *default-restart
    image: redis:7-alpine
    container_name: veloura-redis
    init: true
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --appendfsync
      - everysec
      - --maxmemory
      - 256mb
      - --maxmemory-policy
      - noeviction
      - --auto-aof-rewrite-percentage
      - "100"
      - --auto-aof-rewrite-min-size
      - 64mb
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - veloura
    labels:
      com.centurylinklabs.watchtower.enable: "true"
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M
        reservations:
          cpus: "0.5"
          memory: 256M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
        window: 300s
    logging: *default-logging

  # ── MinIO (S3-compatible storage) ───────────────────────────────
  # Built from Dockerfile.minio (Alpine + statically-linked official
  # MinIO binary) because the official minio/minio image requires
  # x86-64-v2 CPU which this VPS QEMU vCPU does not expose. See
  # Dockerfile.minio for the full story.
  # No host port exposure — only reachable on the internal `veloura`
  # network. Public access goes through Caddy /media/*.
  minio:
    <<: *default-restart
    build:
      context: .
      dockerfile: Dockerfile.minio
    image: veloura-minio:latest
    container_name: veloura-minio
    init: true
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BROWSER: ${MINIO_BROWSER:-off}
      # Auto-configure mc alias `local` for the healthcheck (mc reads MC_HOST_<alias>)
      MC_HOST_local: http://${MINIO_ROOT_USER}:${MINIO_ROOT_PASSWORD}@127.0.0.1:9000
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - veloura
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 256M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
        window: 300s
    logging: *default-logging

  # ── MinIO bucket initialization (runs once, then exits) ─────────
  # Creates the medusa-media bucket, applies anonymous-download policy,
  # and provisions a least-privilege service account that medusa uses
  # instead of the root credentials. Service account credentials are
  # written into a shared volume so medusa can read them on startup.
  #
  # Reuses the custom veloura-minio image (which bundles `mc`) instead
  # of minio/mc:latest, since that image has the same x86-64-v2 issue.
  minio-init:
    image: veloura-minio:latest
    container_name: veloura-minio-init
    user: root
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MC_HOST_local: http://${MINIO_ROOT_USER}:${MINIO_ROOT_PASSWORD}@minio:9000
    entrypoint: ["/bin/sh", "-eu", "-c"]
    command:
      - |
        mc mb --ignore-existing local/medusa-media
        mc anonymous set download local/medusa-media
        echo "Bucket medusa-media ready (public download, no listing)"
    networks:
      - veloura
    restart: "no"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "2"

  # ── Watchtower (auto-update base images) ────────────────────────
  # Uses nickfedor/watchtower (maintained fork) — the original
  # containrrr/watchtower is archived and ships an old Docker API
  # client that this server's daemon refuses ("client version 1.25 is
  # too old"). Watchtower only updates pulled images (postgres, redis,
  # caddy, watchtower itself); the locally-built veloura-medusa and
  # veloura-minio images are skipped because they have no upstream tag.
  watchtower:
    <<: *default-restart
    image: nickfedor/watchtower:latest
    container_name: veloura-watchtower
    init: true
    environment:
      WATCHTOWER_CLEANUP: "true"
      WATCHTOWER_INCLUDE_RESTARTING: "true"
      WATCHTOWER_LABEL_ENABLE: "true"
      WATCHTOWER_SCHEDULE: "0 0 4 * * *"
      WATCHTOWER_MONITOR_ONLY: "false"
      WATCHTOWER_NOTIFICATIONS_LEVEL: warn
    labels:
      com.centurylinklabs.watchtower.enable: "true"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - veloura
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
      restart_policy:
        condition: on-failure
        delay: 30s
        max_attempts: 5
        window: 600s
    logging: *default-logging

volumes:
  postgres_data:
  redis_data:
  minio_data:
  caddy_data:
  caddy_config:

networks:
  veloura:
    driver: bridge
